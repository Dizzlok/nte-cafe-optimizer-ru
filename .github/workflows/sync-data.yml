name: Sync data.js

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Скачать data.js из оригинального репозитория
        run: |
          curl -o data.js https://raw.githubusercontent.com/Kuro-121/NTE-CafeOptimizer/main/data.js

      - name: Проверить изменения и закоммитить
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update data.js"
            git push
            echo "✅ data.js обновлен"
          else
            echo "ℹ️ Изменений нет, файл актуален"
          fi
