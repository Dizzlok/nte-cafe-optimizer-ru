name: Sync data.js

on:
  schedule:
    - cron: '0 * * * *' # Запускается каждый час (в 00 минут)
  workflow_dispatch: # Позволяет запустить вручную кнопкой в GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout твоего репозитория
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Скачать data.js из оригинального репозитория
        run: |
          curl -o data.js https://raw.githubusercontent.com/Kuro-121/NTE-CafeOptimizer/main/data.js

      - name: Закоммитить изменения, если файл обновился
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update data.js" && git push)
