<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe by Origen — Оптимизатор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grain"></div>
    <header>
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">☕</span>
                <div>
                    <div class="logo-title">Cafe by Origen</div>
                    <div class="logo-sub">Оптимизатор ростера</div>
                </div>
            </div>
            <nav class="tabs">
                <button class="tab active" data-tab="optimizer">Оптимизатор</button>
                <button class="tab" data-tab="dishes">Блюда</button>
                <button class="tab" data-tab="characters">Персонажи</button>
            </nav>
        </div>
    </header>

    <main>
        <!-- Вкладка: Оптимизатор -->
        <section id="tab-optimizer" class="tab-content active">
            <div class="optimizer-grid">
                <div class="panel">
                    <div class="panel-title">Настройки</div>
                    <div class="field-group">
                        <label for="cafesOwned">Кафе в собственности</label>
                        <span class="field-hint">Макс. блюд и персонажей</span>
                        <select id="cafesOwned">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5" selected>5</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label for="trendCategory">Текущий тренд</label>
                        <select id="trendCategory">
                            <option value="">— Нет —</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label for="trendBonus">Бонус тренда (+Fons)</label>
                        <input type="number" id="trendBonus" value="0" step="0.01">
                    </div>
                    <div class="field-group">
                        <label for="popularityBonus">Бонус популярности</label>
                        <input type="number" id="popularityBonus" value="0" step="0.01">
                    </div>
                    <button id="btnRun" class="btn-run">
                        <span class="btn-icon"></span>
                        <span>Рассчитать</span>
                    </button>
                    <div id="rosterSummary" class="roster-summary"></div>
                </div>

                <div class="panel full-panel">
                    <div class="panel-title">Результаты</div>
                    <div id="resultsArea">
                        <div class="results-placeholder">
                            <div class="placeholder-icon">☕</div>
                            <p>Настройте параметры и запустите оптимизатор, чтобы увидеть лучший состав.</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Вкладка: Блюда -->
        <section id="tab-dishes" class="tab-content">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">Блюда</div>
                    <div style="display:flex;gap:0.5rem">
                        <button id="btnToggleAllOwned" class="btn-bulk">Выбрать все</button>
                        <button id="btnToggleAllLevel" class="btn-bulk">Поставить все Ур. 2</button>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>В наличии</th>
                                <th>Уровень</th>
                                <th>Название</th>
                                <th>Тип</th>
                                <th>Ингредиенты</th>
                                <th>Цена L1</th>
                                <th>Цена L2</th>
                            </tr>
                        </thead>
                        <tbody id="dishTableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Вкладка: Персонажи -->
        <section id="tab-characters" class="tab-content">
            <div class="panel">
                <div class="panel-title">Персонажи</div>
                <div id="charCards" class="char-cards"></div>
            </div>
        </section>
    </main>

    <script src="localization.js"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="app.js"></script>
</body>
</html>
